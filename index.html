<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDSM Community Registration Form</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 900px;
    }

    .container {
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 450px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }

    input[type="submit"]:hover {
        background-color: #45a049;
    }

    /* Image styling */
    .image-box {
        margin-top: 20px;
        width: 100%;
        max-width: 450px;
    }

    .image-box img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        object-fit: cover;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Desktop layout */
    @media (min-width: 768px) {
        .wrapper {
            flex-direction: row;
            justify-content: center;
            gap: 30px;
        }

        .container {
            max-width: 400px;
        }

        .image-box {
            max-width: 400px;
        }
    }
</style>
</head>

<body>

<div class="wrapper">

    <div class="container">
        <h2>BDSM Community Group Registration Form</h2>

        <form action="fee.html" method="GET">
            <label>Full Name:</label>
            <input type="text" name="schoolName" required>

            <label>Address:</label>
            <input type="text" name="address" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Contact Number:</label>
            <input type="text" name="Number" required>

            <label>Number of Group Members:</label>
            <input type="number" name="numberOfStudents" min="1" required>

            <input type="submit" value="Submit">
        </form>
    </div>

    <div class="image-box">
        <img src="img/bds2.png" alt="BDSM Image">
    </div>

</div>

</body>
</html>
